  <style>
    .弹幕左右 {
      position: absolute;
      pointer-events: none;
      top: 50%;
      left: 0;
      animation: 弹幕左右 20s linear forwards;
    }

    @keyframes 弹幕左右 {
      0% {
        transform: translateX(100vw);
      }

      }
    }

    .弹幕上下 {

      pointer-events: none;

  </style>
  <script>
    let 数据 = ["java太罗嗦了"
      , "c++语法太乱"
      , "为什么应用级的kt也罗嗦"
      , "c#值得学"
      , "c可以学,用来写解释器"
      , "原生html-css-js值得学,至于前端框架,还是算了"
      , "godot很轻量,但导出应用不够小"

      , "努力学画画中.........."

      , "听言辩事判人心,谈言说笑欲识君."
      , "人贤露三面锋芒,剑出任四溅残影."

      , "能否通过未解之物理解自己(ba"
      , "技术宅拯救世界>.<"

      , "欸嘿嘿...."

      , "机会大于努力,运气也是实力的一部分."

    ]
    let 弹幕区域 = document.getElementById('弹幕区域');
    function 发送弹幕(内容) {
      const 弹幕 = document.createElement('span');
      弹幕.textContent = 内容;
      if (window.innerWidth < window.innerHeight * 0.8) {
        弹幕.className = '弹幕上下';
        弹幕.style.left = `${Math.random() * 100}%`;
       
      } else {
        弹幕.className = '弹幕左右';
        弹幕.style.top = `${Math.random() * 100}%`;
       
      }


      弹幕区域.appendChild(弹幕);



      弹幕.addEventListener('animationend', () => {
        弹幕.remove();
      });
    }
    setInterval(() => {
      if (document.hidden) { return }
      const 随机内容 = 数据[Math.floor(Math.random() * 数据.length)];
      发送弹幕(随机内容);
    }, 1000);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        for (const element of 弹幕区域.children) {
          const animation = element.getAnimations()[0];
          if (animation) {
            animation.pause();
          }
        }

      } else {
        for (const element of 弹幕区域.children) {
          const animation = element.getAnimations()[0];
          if (animation) {
            animation.play();
          }
        }

      }
    });
  </script>
